<h2 mat-dialog-title>{{ (isEditMode ? 'categoryPayment.editTitle' : 'categoryPayment.addTitle') | translate }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>{{ 'categoryPayment.paymentDate' | translate }}</mat-label>
      <input matInput [matDatepicker]="paymentDatePicker" formControlName="paymentDate" />
      <mat-datepicker-toggle matIconSuffix [for]="paymentDatePicker"></mat-datepicker-toggle>
      <mat-datepicker #paymentDatePicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.amount' | translate }}</mat-label>
      <span matTextPrefix>₹&nbsp;</span>
      <input matInput type="number" formControlName="amount" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>{{ 'common.remarks' | translate }}</mat-label>
      <input matInput formControlName="remarks" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-flat-button color="primary" type="submit">{{ 'common.save' | translate }}</button>
  </mat-dialog-actions>
</form>
