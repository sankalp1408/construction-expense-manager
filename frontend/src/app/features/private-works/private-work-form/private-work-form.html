<h2 mat-dialog-title>{{ (isEditMode ? 'privateWork.editTitle' : 'privateWork.newTitle') | translate }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form-grid">
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>{{ 'privateWork.clientName' | translate }}</mat-label>
      <input matInput formControlName="clientName" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>{{ 'privateWork.workDescription' | translate }}</mat-label>
      <input matInput formControlName="workDescription" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'privateWork.areaSqft' | translate }}</mat-label>
      <input matInput type="number" formControlName="areaSqft" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'privateWork.ratePerSqft' | translate }}</mat-label>
      <input matInput type="number" formControlName="ratePerSqft" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-flat-button color="primary" type="submit">{{ 'common.save' | translate }}</button>
  </mat-dialog-actions>
</form>
